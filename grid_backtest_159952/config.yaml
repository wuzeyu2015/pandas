# ETF网格回测配置

# 基础配置
symbol: "159952"
start_date: "2023-01-01"
end_date: "2025-12-31"
initial_cash: 100000  # 初始资金（元）

# 网格策略参数
grid_type: "percentage"  # 网格类型: percentage(百分比) / fixed(固定价格)
initial_price: null  # 初始价格，null表示使用回测开始日的收盘价
grid_step: 0.05  # 网格步长：5%
grid_number: 10  # 网格层数（单边）
position_per_grid: 1000  # 每网格交易股数

# 交易成本
commission_rate: 0.0003  # 佣金率：万3
stamp_tax_rate: 0.001  # 印花税率：千1（仅卖出）
min_commission: 5  # 最低佣金（元）
slippage: 0.001  # 滑点率

# 回测参数
use_daily_close: false  # 使用日收盘价回测（简化模式）
trade_time: "open"  # 交易时间: open(开盘) / close(收盘)
enable_stop_loss: false  # 启用止损
stop_loss_rate: 0.20  # 止损比例